# 애플리케이션 기본 설정
spring.application.name=civicdraft
spring.application.description=통합 민원 북마클릿 시스템

# 데이터베이스 설정 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/khtml_draft
spring.datasource.username=postgres
spring.datasource.password=P(sjs837483)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 서버 포트
server.port=8084

# Node.js 서버 설정
nodejs.server.url=http://localhost:3000
nodejs.server.health-check-url=${nodejs.server.url}/health
nodejs.server.connect-timeout=5000
nodejs.server.read-timeout=10000

# 민원 시스템별 PWA 포트 설정 (참조용)
complaint.system.safety.port=8082
complaint.system.safety.name=안전신문고
complaint.system.safety.url=https://www.safetyreport.go.kr

complaint.system.ddm.port=8081
complaint.system.ddm.name=구청장에게 바란다
complaint.system.ddm.url=https://www.ddm.go.kr/www/contents.do?key=735

complaint.system.saeol.port=8083
complaint.system.saeol.name=새올전자민원창구
complaint.system.saeol.url=https://eminwon.ddm.go.kr

# CORS 설정 (모든 PWA와 Node.js 서버 포함)
spring.web.cors.allowed-origins=http://localhost:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:8084,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# 로깅 설정
logging.level.root=INFO
logging.level.kr.ddm.civic=DEBUG
logging.level.kr.ddm.civic.civicdraft.service=DEBUG
logging.level.kr.ddm.civic.civicdraft.controller=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# API 응답 설정
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# 파일 업로드 설정 (향후 사용)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# 에러 처리
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false