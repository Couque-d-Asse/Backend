# 애플리케이션 기본 설정
spring.application.name=civicdraft

# 데이터베이스 설정 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/khtml_draft
spring.datasource.username=postgres
spring.datasource.password=P(sjs837483)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 서버 포트
server.port=8084

# Node.js 서버 설정
nodejs.server.url=http://localhost:3000

# CORS 설정 (모든 PWA와 Node.js 서버 포함)
spring.web.cors.allowed-origins=http://localhost:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# 로깅 설정
logging.level.root=INFO
logging.level.kr.ddm.civic=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE