<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 북마클렛 자동 입력</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>통합 북마클렛 자동 입력 시스템</h1>
            <p>여러 민원창구를 하나의 북마클렛에서 관리하세요.</p>
        </header>
        <main>
            <section>
                <h2>민원 채널 선택</h2>
                <select id="channelSelect">
                    <option value="ddm">동대문구청</option>
                    <option value="saeol">새올전자민원창구</option>
                    <option value="safety">안전신문고</option>
                </select>
            </section>
            <section>
                <h2>민원 정보 입력</h2>
                <form id="complaintForm">
                    <div class="form-group">
                        <label for="title">제목</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="content">내용</label>
                        <textarea id="content" name="content" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="extra">부가 정보</label>
                        <input type="text" id="extra" name="extra">
                    </div>
                    <button type="submit">북마클렛 생성</button>
                </form>
            </section>
            <section>
                <h2>북마클렛 코드</h2>
                <textarea id="bookmarkletCode" readonly style="width:100%;height:80px;"></textarea>
                <button id="copyBtn">코드 복사</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2025 통합 북마클렛 자동 입력 시스템</p>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
